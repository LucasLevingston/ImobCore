services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth_db']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-properties:
    image: postgres:16-alpine
    container_name: postgres-properties
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: properties_db
    ports:
      - '5434:5432'
    volumes:
      - postgres_properties_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d properties_db']
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      AUTH_SERVICE_PORT: 3001
      AUTH_DATABASE_URL: postgresql://postgres:postgres@postgres-auth:5432/auth_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      JWT_ACCESS_TOKEN_EXPIRES_IN: ${JWT_ACCESS_TOKEN_EXPIRES_IN:-15m}
      JWT_REFRESH_TOKEN_EXPIRES_IN: ${JWT_REFRESH_TOKEN_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
    ports:
      - '3001:3001'
    depends_on:
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5

  properties-service:
    build:
      context: .
      dockerfile: services/properties-service/Dockerfile
    container_name: properties-service
    restart: unless-stopped
    environment:
      PROPERTIES_SERVICE_PORT: 3002
      PROPERTIES_DATABASE_URL: postgresql://postgres:postgres@postgres-properties:5432/properties_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
    ports:
      - '3002:3002'
    depends_on:
      postgres-properties:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3002/health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    environment:
      API_GATEWAY_PORT: 3004
      AUTH_SERVICE_URL: http://auth-service:3001
      PROPERTIES_SERVICE_URL: http://properties-service:3002
      CORS_ORIGIN: ${NEXT_PUBLIC_AUTH_FRONTEND_URL:-http://localhost:3000},${NEXT_PUBLIC_PROPERTIES_FRONTEND_URL:-http://localhost:3003},${NEXT_PUBLIC_PORTAL_FRONTEND_URL:-http://localhost:3005}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_TIME_WINDOW: ${RATE_LIMIT_TIME_WINDOW:-1 minute}
    ports:
      - '3004:3004'
    depends_on:
      auth-service:
        condition: service_healthy
      properties-service:
        condition: service_healthy
    healthcheck:
      # api-gateway roda em node:20-bookworm-slim (não Alpine — ver comentário
      # no Dockerfile), que não inclui wget por padrão; usa fetch nativo do Node
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3004/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  auth-frontend:
    build:
      context: .
      dockerfile: apps/auth-frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: ${NEXT_PUBLIC_API_GATEWAY_URL:-http://localhost:3004}
    container_name: auth-frontend
    restart: unless-stopped
    # NEXT_PUBLIC_* é baked em build-time (args acima) — declarar aqui em
    # `environment:` não teria efeito no bundle já compilado, por isso não repetimos
    ports:
      - '3000:3000'
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/login || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5

  properties-frontend:
    build:
      context: .
      dockerfile: apps/properties-frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: ${NEXT_PUBLIC_API_GATEWAY_URL:-http://localhost:3004}
        NEXT_PUBLIC_AUTH_FRONTEND_URL: ${NEXT_PUBLIC_AUTH_FRONTEND_URL:-http://localhost:3000}
    container_name: properties-frontend
    restart: unless-stopped
    # NEXT_PUBLIC_* é baked em build-time (args acima) — declarar aqui em
    # `environment:` não teria efeito no bundle já compilado, por isso não repetimos
    ports:
      - '3003:3003'
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3003/api/health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_auth_data:
  postgres_properties_data:
