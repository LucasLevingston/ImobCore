name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Segredos de CI — nunca os reais, só o suficiente pra passar validação de
  # env (Zod) e prisma generate. Testes de integração (Postgres real via
  # Testcontainers) não rodam aqui — só a suíte unitária (mocks/fakes).
  JWT_SECRET: ci-only-secret-key-with-at-least-32-characters
  AUTH_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/auth_db?schema=public
  PROPERTIES_DATABASE_URL: postgresql://postgres:postgres@localhost:5434/properties_db?schema=public
  NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:3004
  NEXT_PUBLIC_AUTH_FRONTEND_URL: http://localhost:3000

# Ordem intencionalmente sequencial (needs: em cadeia, não paralelo): falha
# rápido na etapa mais barata primeiro — typecheck é o mais rápido de rodar
# e o mais comum de quebrar; build (compila 3 apps Next.js) é o mais caro,
# só roda depois de tudo mais já ter passado.
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspaces --if-present

  lint:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # inclui as regras de arquitetura em .eslintrc.base.json (max-lines,
      # 1 função por arquivo, sem misturar function/type/const exportados,
      # import/no-cycle) — não é só estilo, é a "porta" de SOLID/desacoplamento
      - run: npm run lint --workspaces --if-present

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # vitest falha o processo se a cobertura de algum workspace cair abaixo
      # do threshold (95%) configurado em cada vitest.config.ts — a "porta de
      # cobertura" já é o próprio job de test, não precisa de um job separado
      - run: npm run test:coverage --workspaces --if-present

  orval:
    runs-on: ubuntu-latest
    needs: test
    # Sobe auth-service/properties-service de verdade (não fakes) contra um
    # Postgres real, e roda `orval` contra a spec OpenAPI que eles expõem —
    # falha rápido se uma mudança de rota/schema quebrar a geração do client
    # TS (ex: um tipo Zod que zod-to-json-schema não sabe converter), antes
    # de chegar no job de build (mais caro) ou pior, em produção.
    services:
      postgres-auth:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_db
        ports: ['5433:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      postgres-properties:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: properties_db
        ports: ['5434:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run prisma:deploy --workspace=auth-service
      - run: npm run prisma:deploy --workspace=properties-service
      - name: Start auth-service in background
        run: npx tsx --import ./services/auth-service/src/main/tracing.ts services/auth-service/src/main/server.ts &
        env:
          NODE_ENV: development
      - name: Start properties-service in background
        run: npx tsx --import ./services/properties-service/src/main/tracing.ts services/properties-service/src/main/server.ts &
        env:
          NODE_ENV: development
      - name: Wait for services to be ready
        run: npx wait-on http://localhost:3001/health http://localhost:3002/health --timeout 30000
      - run: npm run generate:api --workspace=auth-frontend
        env:
          AUTH_SERVICE_OPENAPI_URL: http://localhost:3001/docs/json
      - run: npm run generate:api --workspace=properties-frontend
        env:
          PROPERTIES_SERVICE_OPENAPI_URL: http://localhost:3002/docs/json

  build:
    runs-on: ubuntu-latest
    needs: orval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # auth-service/properties-service/api-gateway não têm script "build"
      # (rodam via tsx direto, sem etapa de compilação) — --if-present pula
      # cada um deles; só os 2 frontends (next build) e packages/ui (sem
      # build step próprio, também pulado) entram aqui de fato
      - run: npm run build --workspaces --if-present

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: properties-service
            dockerfile: services/properties-service/Dockerfile
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: auth-frontend
            dockerfile: apps/auth-frontend/Dockerfile
          - name: properties-frontend
            dockerfile: apps/properties-frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
